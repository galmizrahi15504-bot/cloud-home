# ============================================================
# ☁️ CLOUD HOME — Core Infrastructure
# ============================================================
# The foundation: reverse proxy, auth, monitoring, DNS
# Start this FIRST before any other compose files.
# ============================================================

networks:
  cloud-net:
    name: cloud-net
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  authelia_config:
  portainer_data:
  uptime_kuma_data:
  adguard_work:
  adguard_conf:
  redis_data:

services:
  # ----------------------------------------------------------
  # 🔀 Caddy — Reverse Proxy + Automatic HTTPS
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🔐 Authelia — Single Sign-On + 2FA
  # ----------------------------------------------------------
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TIMEZONE:-UTC}
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - X_AUTHELIA_CONFIG_FILTERS=template
    healthcheck:
      test: ["CMD", "authelia", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🔴 Redis — Cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🐳 Portainer — Container Management UI
  # ----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 📊 Uptime Kuma — Service Monitoring
  # ----------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🛡️ AdGuard Home — DNS + Ad/Tracker Blocking
  # ----------------------------------------------------------
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🔄 Watchtower — Auto-Update Containers
  # ----------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_ROLLING_RESTART=true
      - TZ=${TIMEZONE:-UTC}
    networks:
      - cloud-net
