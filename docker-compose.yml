# ============================================================
# ☁️ CLOUD HOME — Simple Stack (6-month VPS edition)
# ============================================================
# 7 services. One file. One command to start everything.
# Run: docker compose up -d
# ============================================================

networks:
  cloud-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  nextcloud_data:
  vaultwarden_data:
  ollama_models:
  openwebui_data:
  jellyfin_config:
  jellyfin_cache:

services:

  # ----------------------------------------------------------
  # 🔀 Caddy — Reverse Proxy + Automatic HTTPS
  # Handles SSL certificates automatically. No config needed.
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🐘 PostgreSQL — Shared Database
  # One database server for all services that need one.
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cloudadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🔴 Redis — Cache (needed by Nextcloud)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # ☁️ Nextcloud — Files, Photos, Calendar, Contacts
  # Your Google Drive + Google Photos replacement.
  # First login: use NEXTCLOUD_ADMIN_USER / NEXTCLOUD_ADMIN_PASSWORD
  # ----------------------------------------------------------
  nextcloud:
    image: nextcloud:stable-apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.${DOMAIN}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${POSTGRES_USER:-cloudadmin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=cloud.${DOMAIN}
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=10G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🔑 Vaultwarden — Password Manager
  # Your 1Password replacement. Use the Bitwarden app to connect.
  # First visit: register your account at vault.YOURDOMAIN.com
  # After registering: set SIGNUPS_ALLOWED=false and restart.
  # ----------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - vaultwarden_data:/data
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS:-true}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=warn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🧠 Ollama — Local AI Model Runner
  # Runs AI models privately on your server.
  # After starting: docker exec ollama ollama pull phi3:mini
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 512M
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 💬 Open WebUI — AI Chat Interface
  # One interface for both local models AND Claude/GPT APIs.
  # First visit: create your admin account at ai.YOURDOMAIN.com
  # Add Claude: Admin Panel → Settings → Connections → Anthropic
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cloud-net

  # ----------------------------------------------------------
  # 🎥 Jellyfin — Media Server (OPTIONAL)
  # Your Netflix replacement. Comment this whole section out
  # if you don't have movies/shows to watch.
  # Put your media in the MEDIA_PATH folder on the server.
  # ----------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_PATH:-./media}:/data/media:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cloud-net
