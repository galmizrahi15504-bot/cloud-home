# ============================================================
# 👤 Authelia — User Database
# ============================================================
# Generate a password hash by running:
#   docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password 'YOUR_PASSWORD'
# Then paste the hash below.
# ============================================================

users:
  gal:
    disabled: false
    displayname: "Gal"
    # CHANGE THIS: Generate a proper hash using the command above
    password: "$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_YOUR_HASH"
    email: gal@yourdomain.com
    groups:
      - admins
      - users
