# ============================================================
# 🔐 Authelia — SSO Configuration
# ============================================================
# Uses Authelia's template filter (X_AUTHELIA_CONFIG_FILTERS=template)
# so {{ env "DOMAIN" }} gets replaced automatically from .env
# ============================================================

server:
  address: 'tcp://0.0.0.0:9091/'

log:
  level: info

totp:
  issuer: CloudHome
  period: 30
  digits: 6

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      memory: 65536
      parallelism: 4
      salt_length: 16
      key_length: 32

session:
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      default_redirection_url: 'https://dash.{{ env "DOMAIN" }}'
  redis:
    host: redis
    port: 6379

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
  # For real email, uncomment and configure:
  # smtp:
  #   address: 'submissions://smtp.gmail.com:465'
  #   username: 'you@gmail.com'
  #   password: 'app-password-here'
  #   sender: 'Cloud Home <you@gmail.com>'

access_control:
  default_policy: two_factor

  rules:
    # Services with their own auth (mobile apps need direct access)
    - domain:
        - 'vault.{{ env "DOMAIN" }}'
        - 'media.{{ env "DOMAIN" }}'
        - 'music.{{ env "DOMAIN" }}'
        - 'books.{{ env "DOMAIN" }}'
        - 'cloud.{{ env "DOMAIN" }}'
        - 'photos.{{ env "DOMAIN" }}'
        - 'git.{{ env "DOMAIN" }}'
      policy: bypass

    # Everything else requires 2FA
    - domain: '*.{{ env "DOMAIN" }}'
      policy: two_factor
